name: Daily Brief Discord Notification

on:
  schedule:
    # 22:00 UTC = 07:00 JST
    - cron: "0 22 * * *"
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          if [ -z "$BACKEND_URL" ] || [ -z "$CRON_TOKEN" ]; then
            echo "::error::BACKEND_URL or CRON_TOKEN secret is missing"
            exit 1
          fi
          curl -fsSL -X POST "$BACKEND_URL/api/cron/notify-brief?engine=claude" \
            -H "X-Cron-Token: $CRON_TOKEN" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
