name: Routines Dispatcher (run-due)

on:
  schedule:
    # 30 分毎。run-due 側が JST + last_run で「今 due なルーティン」だけ実行する
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  run-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger routines dispatcher
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          if [ -z "$BACKEND_URL" ] || [ -z "$CRON_TOKEN" ]; then
            echo "::error::BACKEND_URL or CRON_TOKEN secret is missing"
            exit 1
          fi
          curl -fsSL -X POST "$BACKEND_URL/api/routines/run-due" \
            -H "X-Cron-Token: $CRON_TOKEN" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
